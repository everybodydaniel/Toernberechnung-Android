name: Deploy Docs & Coverage to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate Dokka HTML Documentation
        run: ./gradlew dokkaHtmlMultiModule

      - name: Generate JaCoCo Coverage Report
        run: ./gradlew jacocoTestReport

      - name: Assemble Pages site
        run: |
          mkdir -p public/coverage
          cp -r build/dokka/htmlMultiModule/. public/
          cp -r app/build/reports/jacoco/jacocoTestReport/html/. public/coverage/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Dokka KDoc at site root, JaCoCo coverage under /coverage
          path: 'public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
