# ══════════════════════════════════════════════════════════════
# Törnberechnung – Android CI/CD Pipeline
# ══════════════════════════════════════════════════════════════

name: Android CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew assembleDebug

      - name: Test & Coverage
        run: ./gradlew jacocoTestReport

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/TEST-*.xml'
          check_name: Unit Test Results
          include_passed: true
          detailed_summary: true

      - name: Publish coverage report
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-and-coverage-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/reports/jacoco/jacocoTestReport/html
          if-no-files-found: warn
